name: CI — nRF5340 clean build + acceptance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-verify:
    name: west build (nrf5340dk/cpuapp, sysbuild) + verify-acceptance.sh
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout manifest repo (this project)
        uses: actions/checkout@v4
        with:
          path: Nordic_nRF5340_SPI_loopback

      # The nordicbuilder base images ship python + west + Zephyr SDK + NCS
      # toolchain pre-installed, so we don't have to burn 15+ minutes on
      # `nrfutil toolchain-manager install` every CI run.
      - name: Install system prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
              git curl cmake ninja-build gperf ccache dfu-util device-tree-compiler \
              wget xz-utils file make gcc libsdl2-dev \
              python3-pip python3-venv python3-dev
          # Note: skip gcc-multilib/g++-multilib (flaky on Ubuntu 24.04 mirrors,
          # only needed for bsim/native_sim). Skip libmagic1 (libmagic1t64 on
          # noble; pulled automatically as transitive dependency when needed).

      - name: Install west + nrfutil toolchain-manager
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user west
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          # nrfutil binary for x86_64 Linux. Nordic renamed the URL path in
          # 2025: legacy "linux-amd64" returns a 404 JSON body that bash tries
          # to execute as a script. Use -f so curl exits non-zero on HTTP 404.
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/nrfutil" \
              https://files.nordicsemi.com/artifactory/swtools/external/nrfutil/executables/x86_64-unknown-linux-gnu/nrfutil
          chmod +x "$HOME/.local/bin/nrfutil"
          "$HOME/.local/bin/nrfutil" --version
          "$HOME/.local/bin/nrfutil" install toolchain-manager

      - name: Cache NCS toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/nrfutil
            ~/.nrfutil
            ~/ncs/toolchains
          key: ncs-toolchain-v2.9.0-${{ runner.os }}-v2

      - name: Install NCS v2.9.0 toolchain (if not cached)
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: nrfutil toolchain-manager install --ncs-version v2.9.0

      # Rationale for NOT sourcing `nrfutil env --as-script` directly into
      # GITHUB_ENV: the NCS bundled git needs its own libexec/git-core on
      # PATH AND unpolluted LD_LIBRARY_PATH; partial env propagation breaks
      # git-remote-https with "is not a git command". The cleanest fix
      # (verified Day 5 locally on Ubuntu 24.04) is to run every NCS
      # subcommand through `nrfutil toolchain-manager launch --shell --`,
      # which gives each command a fully-isolated, correctly-prepared env.

      - name: Cache west modules (NCS checkout)
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: |
            nrf
            zephyr
            nrfxlib
            modules
            bootloader
            tools
            test
            .west
          key: ncs-modules-v2.9.0-${{ hashFiles('Nordic_nRF5340_SPI_loopback/west.yml') }}

      - name: west init + update (if not cached)
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: |
          nrfutil toolchain-manager launch --ncs-version v2.9.0 --shell -- \
              west init -l Nordic_nRF5340_SPI_loopback
          nrfutil toolchain-manager launch --ncs-version v2.9.0 --shell -- \
              west update --narrow -o=--depth=1
          nrfutil toolchain-manager launch --ncs-version v2.9.0 --shell -- \
              west zephyr-export

      - name: west zephyr-export (cached path)
        if: steps.cache-modules.outputs.cache-hit == 'true'
        run: |
          nrfutil toolchain-manager launch --ncs-version v2.9.0 --shell -- \
              west zephyr-export

      - name: Clean sysbuild (release configuration)
        working-directory: Nordic_nRF5340_SPI_loopback
        run: |
          rm -rf build
          nrfutil toolchain-manager launch --ncs-version v2.9.0 --shell -- \
              west build -b nrf5340dk/nrf5340/cpuapp --sysbuild

      - name: Strict build (-Werror)
        working-directory: Nordic_nRF5340_SPI_loopback
        run: |
          rm -rf build
          nrfutil toolchain-manager launch --ncs-version v2.9.0 --shell -- \
              west build -b nrf5340dk/nrf5340/cpuapp --sysbuild -- \
              -DCONFIG_COMPILER_WARNINGS_AS_ERRORS=y

      - name: Run acceptance harness
        working-directory: Nordic_nRF5340_SPI_loopback
        run: |
          nrfutil toolchain-manager launch --ncs-version v2.9.0 --shell -- \
              bash verify-acceptance.sh

      - name: Upload merged.hex
        uses: actions/upload-artifact@v4
        with:
          name: merged-hex
          path: Nordic_nRF5340_SPI_loopback/build/merged.hex
          if-no-files-found: error
