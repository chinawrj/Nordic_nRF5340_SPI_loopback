# nRF5340 SPI Loopback + BLE Heart Rate — application Kconfig fragment.

# ---- Logging ----
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_PRINTK=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_BACKEND_UART=y

# ---- SPI (SPIM4 @ 32 MHz) ----
CONFIG_SPI=y
CONFIG_SPI_NRFX=y
CONFIG_SPI_ASYNC=n

# ---- Threading / scheduling ----
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ---- Bluetooth (app core = BLE host) ----
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="nRF5340_HR"
CONFIG_BT_DEVICE_APPEARANCE=833  # Generic Heart Rate Sensor
CONFIG_BT_MAX_CONN=1

# Heart Rate + Device Information services
CONFIG_BT_HRS=y
CONFIG_BT_DIS=y
CONFIG_BT_DIS_MANUF="Nordic Semiconductor"
CONFIG_BT_DIS_MODEL="nRF5340 DK"

# ---- BLE host/controller split (net core handles controller via IPC) ----
CONFIG_BT_HCI_IPC=y

# ---- Misc quality-of-life ----
CONFIG_ASSERT=y
CONFIG_REBOOT=y
