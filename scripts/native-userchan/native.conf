# Day 11 conf overlay for native_sim + BT_USERCHAN (AC-V2).
#
# native_sim DTS already wires chosen zephyr,bt-hci = &bt_hci_userchan,
# so CONFIG_BT_USERCHAN is auto-selected from the DT and must NOT be set here.
#
# We only need to switch off the nRF-specific bits that don't apply on native_sim.

# No nrfx SPI driver on POSIX; spi_loopback code is DT_NODE_EXISTS-guarded
# and disables itself cleanly when spi4 is absent.
CONFIG_SPI_NRFX=n

# No Segger RTT backend on POSIX.
CONFIG_USE_SEGGER_RTT=n
CONFIG_LOG_BACKEND_RTT=n
